<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamera / Galeri</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
}
button {
    padding: 12px 20px;
    font-size: 16px;
}
img {
    margin-top: 20px;
    max-width: 100%;
}
</style>
</head>
<body>

<h2>Upload Gambar New</h2>

<button onclick="document.getElementById('fileInput').click()">
    Pilih Kamera / Galeri
</button>

<input 
    id="fileInput"
    type="file" 
    accept="image/*"
    style="display:none"
    onchange="previewImage(event)"
>

<img id="preview">

<script>
function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('preview').src = e.target.result;
    }
    reader.readAsDataURL(file);
}
</script>

</body>
</html>
